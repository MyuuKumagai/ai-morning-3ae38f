name: 今朝のAI を作って公開する

# 毎朝8:00（メルボルン時間）に走る。GitHubの時計はUTCなので、
# AEST(+10) の 8:00 = UTC 22:00（前日）。夏時間AEDT(+11)の期間は 7:00 になるが、
# ズレて困る性質のものではないので、UTC固定のまま運用する。
on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:        # 手動でも走らせられる（テスト用）

# 生成物をこのリポジトリに書き戻すので書き込み権限が要る
permissions:
  contents: write

concurrency:
  group: daily-newsletter
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: このリポジトリを取り出す
        uses: actions/checkout@v4

      - name: Python を用意する
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 必要な部品を入れる
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet google-genai pillow yt-dlp

      - name: 音声変換のffmpegを入れる
        uses: FedericoCarboni/setup-ffmpeg@v3

      - name: 記事と音声を作る
        env:
          GEMINI_FREE_API_KEY: ${{ secrets.GEMINI_FREE_API_KEY }}
          READER_CONTEXT: ${{ secrets.READER_CONTEXT }}
          AI_DATA_DIR: ${{ github.workspace }}/engine/data
          TZ: Australia/Melbourne
        run: |
          cd engine/tools
          # 過去号はリポジトリ直下にある。バックナンバー一覧に出すため作業場所へ持ってくる
          mkdir -p site
          cp -f ../../20*.html site/ 2>/dev/null || true
          # 本人プロフィールは金庫(Secrets)から取り出して置く。リポジトリには残さない
          printf '%s' "$READER_CONTEXT" > reader_context.md
          python -u ai_video.py --days 2 --max 4 || echo "動画取り込みでエラー（続行）"
          python -u ai_rss.py || echo "RSS取り込みでエラー（続行）"
          python -u ai_newsletter.py

      - name: 記録の準備
        run: |
          git config user.name  "今朝のAI"
          git config user.email "actions@github.com"

      - name: サイトを公開する
        run: |
          # engine/tools/site に出来たものを、リポジトリの直下（＝公開される場所）へ移す
          cp -f engine/tools/site/*.html engine/tools/site/*.png . 2>/dev/null || true
          cp -f engine/tools/site/robots.txt . 2>/dev/null || true
          # プロフィールを消してから記録する（金庫の中身をリポジトリに残さない）
          rm -f engine/tools/reader_context.md
          git add -A
          if git diff --quiet --cached; then
            echo "更新なし"
          else
            git commit -q -m "今朝のAI $(date '+%Y-%m-%d')"
            git push
            echo "公開しました"
          fi
